<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">ICU multi-agent simulation system diagram</title>
  <desc id="desc">A schematic diagram showing ICU patient data flowing through specialized AI agents to alerts, summaries, and ward coordination.</desc>
  <rect width="1200" height="720" fill="#f7fafc"/>
  <rect x="70" y="80" width="1060" height="560" rx="18" fill="#ffffff" stroke="#d9e2ec" stroke-width="3"/>
  <text x="110" y="140" font-family="Arial, sans-serif" font-size="42" font-weight="700" fill="#1f2933">AI-Simulated ICU Multi-Agent System</text>
  <text x="110" y="184" font-family="Arial, sans-serif" font-size="22" fill="#52606d">Event-driven patient monitoring, risk assessment, and clinical workflow support</text>
  <g font-family="Arial, sans-serif">
    <rect x="115" y="260" width="210" height="170" rx="14" fill="#e0f2fe" stroke="#38bdf8" stroke-width="3"/>
    <text x="145" y="320" font-size="26" font-weight="700" fill="#075985">Patient State</text>
    <text x="145" y="360" font-size="18" fill="#334e68">Vitals</text>
    <text x="145" y="388" font-size="18" fill="#334e68">Labs</text>
    <text x="145" y="416" font-size="18" fill="#334e68">Interventions</text>
    <path d="M330 345 H430" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="440" y="230" width="320" height="230" rx="14" fill="#ecfdf5" stroke="#22c55e" stroke-width="3"/>
    <text x="475" y="282" font-size="26" font-weight="700" fill="#166534">Agent Layer</text>
    <text x="475" y="324" font-size="18" fill="#334e68">Bedside Monitor</text>
    <text x="475" y="354" font-size="18" fill="#334e68">Risk Sentinel</text>
    <text x="475" y="384" font-size="18" fill="#334e68">Intervention Tracker</text>
    <text x="475" y="414" font-size="18" fill="#334e68">Clinical Summary</text>
    <path d="M765 345 H865" stroke="#64748b" stroke-width="5" marker-end="url(#arrow)"/>
    <rect x="875" y="260" width="210" height="170" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-width="3"/>
    <text x="910" y="320" font-size="26" font-weight="700" fill="#9a3412">Outputs</text>
    <text x="910" y="360" font-size="18" fill="#334e68">Alerts</text>
    <text x="910" y="388" font-size="18" fill="#334e68">Summaries</text>
    <text x="910" y="416" font-size="18" fill="#334e68">Ward View</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
